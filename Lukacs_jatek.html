<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Emberhalászat – Lukács 5</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #e6f2ff;
  text-align: center;
  margin: 0;
  padding: 20px;
}
.screen { display: none; }
.active { display: block; }
button {
  padding: 10px 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}
#lake {
  width: 300px;
  height: 300px;
  background: #4da6ff;
  margin: auto;
  position: relative;
  border-radius: 10px;
}
.fish {
  position: absolute;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🎣 Emberhalászat</h1>

<div id="menu" class="screen active">
  <p>Lukács 5:1–11 története játékosan</p>
  <button onclick="show('fishing')">1️⃣ Emberhalászat</button>
  <button onclick="show('story')">2️⃣ Beszélgetős történet</button>
  <button onclick="show('lesson')">3️⃣ Mit tanultunk?</button>
</div>

<!-- 1. Játék -->
<div id="fishing" class="screen">
  <h2>🎣 Emberhalászat</h2>
  <p>Kattints az emberekre!</p>
  <div id="lake"></div>
  <p>Elért emberek: <span id="score">0</span></p>
  <button onclick="back()">⬅ Vissza</button>
</div>

<!-- 2. Történet -->
<div id="story" class="screen">
  <h2>🗣 Jézus és Péter</h2>
  <p id="storyText"></p>
  <div id="choices"></div>
  <button onclick="back()">⬅ Vissza</button>
</div>

<!-- 3. Tanulság -->
<div id="lesson" class="screen">
  <h2>✨ Tanulság</h2>
  <p>Mire tanít ez a történet?</p>
  <button onclick="alert('✅ Igen! Engedelmesség és bizalom Jézusban.')">
    Bízz Jézus szavában
  </button>
  <button onclick="alert('❌ Nem erről szól a történet 🙂')">
    Soha ne próbálkozz újra
  </button>
  <br>
  <button onclick="back()">⬅ Vissza</button>
</div>

<script>
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'fishing') startFishing();
  if (id === 'story') startStory();
}

function back() {
  show('menu');
}

/* Emberhalászat */
let score = 0;
function startFishing() {
  score = 0;
  document.getElementById('score').innerText = score;
  const lake = document.getElementById('lake');
  lake.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    let fish = document.createElement('div');
    fish.innerText = '❤️';
    fish.className = 'fish';
    fish.style.left = Math.random()*260 + 'px';
    fish.style.top = Math.random()*260 + 'px';
    fish.onclick = () => {
      score++;
      document.getElementById('score').innerText = score;
      fish.remove();
    };
    lake.appendChild(fish);
  }
}

/* Történet */
function startStory() {
  const text = document.getElementById('storyText');
  const choices = document.getElementById('choices');
  text.innerText = 'Jézus ezt mondja Péternek: „Evezz a mélyre, és vessétek ki a hálókat!”';
  choices.innerHTML = '';

  addChoice('„Uram, egész éjjel fáradtunk…”', false);
  addChoice('„Jó, de csak ha garantálod!” 😄', false);
  addChoice('„A te szavadra mégis kivetem a hálót.” ✅', true);
}

function addChoice(text, correct) {
  const btn = document.createElement('button');
  btn.innerText = text;
  btn.onclick = () => {
    if (correct) {
      alert('🎉 Rengeteg hal! Péter felismeri Jézus hatalmát.');
    } else {
      alert('😅 Ez vicces volt, de próbáld újra!');
      startStory();
    }
  };
  document.getElementById('choices').appendChild(btn);
}
</script>

</body>
</html>
