<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lukács 5 – Interaktív játék</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="bg">
  <div class="wave w1"></div><div class="wave w2"></div><div class="wave w3"></div>
</div>
<div class="app">
<header class="topbar">
  <h1>Lukács 5:1–11</h1>
  <nav>
    <button data-tab="story" class="active">1 · Történet</button>
    <button data-tab="fish">2 · Emberhalászat</button>
    <button data-tab="learn">3 · Tanulságok</button>
  </nav>
</header>
<main>
<!-- GAME 1 -->
<section id="story" class="tab active">
  <div class="progress"><div id="storyProgress"></div></div>
  <div id="storyCard" class="card"></div>
  <div class="controls"><button id="prevStory">◀</button><button id="nextStory">▶</button></div>
</section>
<!-- GAME 2 -->
<section id="fish" class="tab">
  <div class="card">
    <p class="text">Időzítsd a meghívást és érd el az embereket.</p>
    <div id="lake">
      <div id="boat">🚤</div>
    </div>
    <button id="castBtn">Meghívás</button>
    <p id="fishMsg" class="hint"></p>
  </div>
</section>
<!-- GAME 3 -->
<section id="learn" class="tab">
  <div class="card">
    <p class="text">A történet íve</p>
    <div id="order"></div>
    <p id="orderMsg" class="hint"></p>
  </div>
  <div class="card">
    <p class="text">Melyik állapot jellemez most?</p>
    <div id="stateOptions"></div>
    <p id="stateMsg" class="hint"></p>
  </div>
</section>
</main>
</div>
<script src="js/app.js"></script>
</body>
</html>
